# Linker configuration for Ready OS overlay-capable apps.
# Runtime window is $1000-$C5FF. Overlays execute in a carved-out window below $C600.

SYMBOLS {
    __LOADADDR__:     type = import;
    __OVERLAYADDR__:  type = import;
    __STACKSIZE__:    type = weak, value = $0800;
    __OVERLAYSIZE__:  type = weak, value = $1000;
    __HIMEM__:        type = weak, value = $C600;
    __OVERLAYSTART__: type = export, value = __HIMEM__ - __OVERLAYSIZE__;
    __OVERLAY_LOADADDR__: type = export, value = __OVERLAYSTART__ - 2;
}

MEMORY {
    ZP:       file = "", define = yes, start = $0002,                size = $001A;
    LOADADDR: file = %O,               start = $0FFE,                  size = $0002;

    # Resident image: machine code/data loaded by launcher at $1000.
    MAIN:     file = %O, define = yes, start = $1000,                  size = __OVERLAYSTART__ - $1000;

    # Resident BSS must preserve cc65 ONCE for ReadyOS warm resume and stop before
    # overlay PRG load-address bytes. Readyshell relocates its C stack separately.
    BSS:      file = "",               start = __ONCE_RUN__ + __ONCE_SIZE__,
                                                                    size = __OVERLAY_LOADADDR__ - (__ONCE_RUN__ + __ONCE_SIZE__);

    # Overlay payloads are emitted as sidecar PRGs (%O.1, %O.2, ...).
    OVL1ADDR: file = "bin/rsparser.prg",   start = __OVERLAY_LOADADDR__,   size = $0002;
    OVL1:     file = "bin/rsparser.prg",   start = __OVERLAYSTART__,       size = __OVERLAYSIZE__;
    OVL2ADDR: file = "bin/rsvm.prg",       start = __OVERLAY_LOADADDR__,   size = $0002;
    OVL2:     file = "bin/rsvm.prg",       start = __OVERLAYSTART__,       size = __OVERLAYSIZE__;
    OVL3ADDR: file = "bin/rsdrvilst.prg",  start = __OVERLAY_LOADADDR__,   size = $0002;
    OVL3:     file = "bin/rsdrvilst.prg",  start = __OVERLAYSTART__,       size = __OVERLAYSIZE__;
    OVL4ADDR: file = "bin/rsldv.prg",      start = __OVERLAY_LOADADDR__,   size = $0002;
    OVL4:     file = "bin/rsldv.prg",      start = __OVERLAYSTART__,       size = __OVERLAYSIZE__;
    OVL5ADDR: file = "bin/rsstv.prg",      start = __OVERLAY_LOADADDR__,   size = $0002;
    OVL5:     file = "bin/rsstv.prg",      start = __OVERLAYSTART__,       size = __OVERLAYSIZE__;
    OVL6ADDR: file = "bin/rsfops.prg",     start = __OVERLAY_LOADADDR__,   size = $0002;
    OVL6:     file = "bin/rsfops.prg",     start = __OVERLAYSTART__,       size = __OVERLAYSIZE__;
    OVL7ADDR: file = "bin/rscat.prg",      start = __OVERLAY_LOADADDR__,   size = $0002;
    OVL7:     file = "bin/rscat.prg",      start = __OVERLAYSTART__,       size = __OVERLAYSIZE__;
    OVL8ADDR: file = "bin/rscopy.prg",     start = __OVERLAY_LOADADDR__,   size = $0002;
    OVL8:     file = "bin/rscopy.prg",     start = __OVERLAYSTART__,       size = __OVERLAYSIZE__;
    OVL9ADDR: file = "obj/readyshell_unused_ovl9.prg", start = __OVERLAY_LOADADDR__, size = $0002;
    OVL9:     file = "obj/readyshell_unused_ovl9.prg", start = __OVERLAYSTART__,     size = __OVERLAYSIZE__;
}

SEGMENTS {
    ZEROPAGE: load = ZP,       type = zp;
    LOADADDR: load = LOADADDR, type = ro;
    STARTUP:  load = MAIN,     type = ro;
    LOWCODE:  load = MAIN,     type = ro, optional = yes;
    CODE:     load = MAIN,     type = ro;
    RODATA:   load = MAIN,     type = ro;
    DATA:     load = MAIN,     type = rw;
    INIT:     load = MAIN,     type = rw, optional = yes;
    ONCE:     load = MAIN,     type = ro, define = yes, optional = yes;
    BSS:      load = BSS,      type = bss, define = yes;

    OVL1ADDR: load = OVL1ADDR, type = ro;
    OVERLAY1: load = OVL1,     type = ro, define = yes, optional = yes;
    OVL2ADDR: load = OVL2ADDR, type = ro;
    OVERLAY2: load = OVL2,     type = ro, define = yes, optional = yes;
    OVL3ADDR: load = OVL3ADDR, type = ro;
    OVERLAY3: load = OVL3,     type = ro, define = yes, optional = yes;
    OVL4ADDR: load = OVL4ADDR, type = ro;
    OVERLAY4: load = OVL4,     type = ro, define = yes, optional = yes;
    OVL5ADDR: load = OVL5ADDR, type = ro;
    OVERLAY5: load = OVL5,     type = ro, define = yes, optional = yes;
    OVL6ADDR: load = OVL6ADDR, type = ro;
    OVERLAY6: load = OVL6,     type = ro, define = yes, optional = yes;
    OVL7ADDR: load = OVL7ADDR, type = ro;
    OVERLAY7: load = OVL7,     type = ro, define = yes, optional = yes;
    OVL8ADDR: load = OVL8ADDR, type = ro;
    OVERLAY8: load = OVL8,     type = ro, define = yes, optional = yes;
    OVL9ADDR: load = OVL9ADDR, type = ro;
    OVERLAY9: load = OVL9,     type = ro, define = yes, optional = yes;
}

FEATURES {
    CONDES: type = constructor,
            label = __CONSTRUCTOR_TABLE__,
            count = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type = destructor,
            label = __DESTRUCTOR_TABLE__,
            count = __DESTRUCTOR_COUNT__,
            segment = RODATA;
}
